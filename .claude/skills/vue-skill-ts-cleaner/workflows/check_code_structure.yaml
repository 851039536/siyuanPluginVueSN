name: check_code_structure
description: 检查 Vue 3 <script setup lang="ts"> 代码的基本结构与逻辑合理性
checks:
  - label: "使用 defineProps 而非 props 选项（符合 script setup 规范）"
    importance: ⭐⭐⭐
  - label: "响应式变量通过 ref / reactive 正确声明"
    importance: ⭐⭐⭐
  - label: "所有 props 具有明确的 TypeScript 接口或类型定义"
    importance: ⭐⭐⭐
  - label: "没有在 setup 外部使用未导出的逻辑（应全部内联或提取为 composable）"
    importance: ⭐⭐
  - label: "生命周期钩子（如 onMounted）正确导入并使用"
    importance: ⭐⭐
  - label: "模板中引用的变量/函数在 script 中已声明"
    importance: ⭐⭐⭐
