name: confirm_optimization_plan
description: 在执行任何清理前，向用户展示优化建议并请求确认
checks:
  - label: "列出所有建议删除的代码行及原因（附上下文）"
    importance: ⭐⭐⭐
  - label: "高亮可能影响功能的边缘情况（如仅在动态 key 中使用）"
    importance: ⭐⭐⭐
  - label: "提供‘保留’或‘移除’的交互选项（默认保留）"
    importance: ⭐⭐⭐
  - label: "生成优化后的预览代码供用户比对"
    importance: ⭐⭐⭐
  - label: "确认用户已理解变更不影响核心功能"
    importance: ⭐⭐⭐
