<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>

    <!-- 代码块渐变 -->
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:0.95" />
    </linearGradient>

    <!-- 强调色渐变 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97757;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e89b7b;stop-opacity:1" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- 装饰性网格 -->
  <g opacity="0.1">
    <line x1="0" y1="157" x2="1200" y2="157" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="#ffffff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#ffffff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- 装饰性圆形 -->
  <circle cx="100" cy="100" r="200" fill="#d97757" opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#6a9bcc" opacity="0.05"/>

  <!-- 主标题区域 -->
  <g transform="translate(100, 180)">
    <!-- 副标题标签 -->
    <rect x="0" y="-50" width="180" height="40" rx="20" fill="url(#accentGradient)" filter="url(#glow)"/>
    <text x="90" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">插件开发实战</text>

    <!-- 主标题 -->
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">
      思源笔记插件
    </text>
    <text x="0" y="130" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">
      <tspan fill="#d97757">目录索引</tspan>功能
    </text>

    <!-- 简短描述 -->
    <text x="0" y="200" font-family="Arial, sans-serif" font-size="24" fill="#b0aea5">
      SQL 查询优化 · 智能更新机制 · DOM 操作技巧
    </text>
  </g>

  <!-- 代码编辑器窗口 -->
  <g transform="translate(550, 280)">
    <!-- 窗口背景 -->
    <rect x="0" y="0" width="580" height="280" rx="10" fill="url(#codeGradient)" stroke="#4a5568" stroke-width="2"/>

    <!-- 窗口标题栏 -->
    <rect x="0" y="0" width="580" height="40" rx="10" fill="#2d3748"/>
    <rect x="0" y="30" width="580" height="10" fill="#2d3748"/>

    <!-- 窗口控制点 -->
    <circle cx="25" cy="20" r="8" fill="#fc8181"/>
    <circle cx="50" cy="20" r="8" fill="#f6e05e"/>
    <circle cx="75" cy="20" r="8" fill="#68d391"/>

    <!-- 代码内容 -->
    <g transform="translate(25, 75)" font-family="Consolas, Monaco, monospace" font-size="14">
      <!-- 函数定义 -->
      <text x="0" y="0" fill="#c792ea">async function</text>
      <text x="110" y="0" fill="#61afef">insertIndex</text>
      <text x="200" y="0" fill="#ffffff">(</text>
      <text x="208" y="0" fill="#ffcb6b">plugin</text>
      <text x="265" y="0" fill="#ffffff">) {</text>

      <!-- SQL 查询注释 -->
      <text x="20" y="35" fill="#5c6370">// 使用 SQL 查询子文档</text>

      <!-- SQL 查询 -->
      <text x="20" y="65" fill="#ffffff">const</text>
      <text x="65" y="65" fill="#ffcb6b">subDocs</text>
      <text x="135" y="65" fill="#ffffff"> = </text>
      <text x="160" y="65" fill="#61afef">await</text>
      <text x="215" y="65" fill="#d97757">api</text>
      <text x="245" y="65" fill="#ffffff">.</text>
      <text x="253" y="65" fill="#61afef">sql</text>
      <text x="280" y="65" fill="#ffffff">(</text>
      <text x="0" y="95" fill="#98c379">`SELECT id, content, hpath</text>
      <text x="0" y="125" fill="#98c379">  FROM blocks</text>
      <text x="0" y="155" fill="#98c379">  WHERE type = 'd'</text>
      <text x="0" y="185" fill="#98c379">  ORDER BY hpath ASC`</text>
      <text x="295" y="185" fill="#ffffff">)</text>

      <!-- 闭合括号 -->
      <text x="0" y="220" fill="#ffffff">}</text>
    </g>

    <!-- 语法高亮装饰 -->
    <rect x="545" y="90" width="25" height="15" rx="3" fill="#d97757" opacity="0.8"/>
    <text x="557" y="101" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ffffff">SQL</text>
  </g>

  <!-- 底部装饰线 -->
  <g transform="translate(100, 530)">
    <rect x="0" y="0" width="100" height="4" rx="2" fill="#d97757"/>
    <rect x="120" y="0" width="60" height="4" rx="2" fill="#6a9bcc"/>
    <rect x="200" y="0" width="40" height="4" rx="2" fill="#788c5d"/>

    <text x="0" y="40" font-family="Arial, sans-serif" font-size="18" fill="#b0aea5">
      TypeScript · Vue 3 · Vite · SiYuan API
    </text>
  </g>

  <!-- 右下角图标装饰 -->
  <g transform="translate(1050, 520)">
    <!-- 数据库图标 -->
    <g opacity="0.3">
      <ellipse cx="0" cy="0" rx="30" ry="10" fill="none" stroke="#ffffff" stroke-width="2"/>
      <path d="M-30 0 v30 a30 10 0 0 0 60 0 v-30" fill="none" stroke="#ffffff" stroke-width="2"/>
      <path d="M-30 15 a30 10 0 0 0 60 0" fill="none" stroke="#ffffff" stroke-width="2"/>
    </g>
  </g>

  <!-- 左上角小图标 -->
  <g transform="translate(60, 60)">
    <polygon points="0,15 15,0 30,15 15,30" fill="none" stroke="#d97757" stroke-width="2" opacity="0.5"/>
  </g>
</svg>